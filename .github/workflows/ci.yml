name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Build app
        run: npm run build

  robot-tests:
    runs-on: ubuntu-latest
    needs: quality-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Robot Framework
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-browser

      - name: Install Browser Library dependencies
        run: rfbrowser init

      - name: Start Next.js app
        run: npm run dev &
      
      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000

      - name: Run Robot tests
        run: robot tests/jobtracker.robot

      - name: Upload Robot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: |
            log.html
            report.html
            output.xml